<!-- DIET -->
<div id="diet-screen" class="screen">
  <div class="section-hdr">
    <h3>🍽️ Diário alimentar</h3>
    <button class="add-btn" onclick="openFoodModal()">+ Adicionar</button>
  </div>
  <div class="card">
    <div class="card-title">📊 Total de hoje</div>
    <div class="macro-grid" id="diet-totals"></div>
  </div>
  <div id="meal-list"></div>
  <div id="meal-empty" class="empty-state">
    <div class="icon">🍽️</div>
    <p>Ainda sem refeições hoje.<br>Toca em "+ Adicionar" para começar.</p>
  </div>
</div>
