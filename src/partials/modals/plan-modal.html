<!-- MODAL: NEW/EDIT PLAN -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <h3 id="plan-modal-title">🏋️ Novo treino <button class="modal-close" onclick="closeModal('plan-modal')">×</button></h3>
    <div class="form-group">
      <label class="form-label">Nome do treino</label>
      <input class="form-input" id="p-name" placeholder="ex: Full Body A"/>
    </div>
    <div class="form-group">
      <label class="form-label">Frequência (dias da semana)</label>
      <div class="freq-days" id="freq-days"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Exercícios</label>
      <div id="plan-exercises-build"></div>
      <button type="button" class="btn-secondary" onclick="addExerciseRow()">+ Adicionar exercício</button>
    </div>
    <button class="btn-primary" onclick="savePlan()">Guardar treino</button>
  </div>
</div>
